name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Smoke test — import aria modules
        run: |
          python -c "from core.event_bus import EventBus, ARIAEvent"
          python -c "from modules.lci.context_injector import LiveContextInjector"
          python -c "from modules.pp.pipeline_pulse import PipelinePulse"
          python -c "from modules.avl.value_ledger import AIValueLedger"
          python -c "from modules.fle.feedback_engine import FeedbackLoopEngine"

      - name: Run test suite
        run: pytest tests/ -v --tb=short
